bundle:
  name: "genie-space-optimizer"

variables:
  app_name:
    description: "Databricks App name (must be unique in your workspace)"
    default: "genie-space-optimizer"
  catalog:
    description: "Unity Catalog name for storing optimization state tables"
    default: "main"
  gold_schema:
    description: "Schema within the catalog for optimization tables"
    default: "genie_optimization"
  warehouse_id:
    description: "SQL Warehouse ID for query execution"
  deploy_profile:
    default: "DEFAULT"

sync:
  include:
    - .build
    - .build/**

artifacts:
  default:
    build: apx build && rm -f .build/.gitignore && python resources/patch_app_yml.py .build/app.yml --catalog ${var.catalog} --schema ${var.gold_schema} --warehouse-id ${var.warehouse_id} && uv run python resources/grant_app_uc_permissions.py --profile ${var.deploy_profile} --app-name ${var.app_name} --catalog ${var.catalog} --schema ${var.gold_schema}

resources:
  schemas:
    genie_optimization_schema:
      name: ${var.gold_schema}
      catalog_name: ${var.catalog}
      comment: "Genie Space Optimizer state tables, prompts, and benchmarks"

  apps:
    genie-space-optimizer-app:
      name: ${var.app_name}
      description: "genie-space-optimizer created with apx"
      source_code_path: ./.build
      user_api_scopes:
        - "dashboards.genie"
        - "files.files"
        - "catalog.catalogs:read"
        - "catalog.schemas:read"
        - "catalog.tables:read"
        - "sql"
      config:
        env:
          - name: GENIE_SPACE_OPTIMIZER_CATALOG
            value: ${var.catalog}
          - name: GENIE_SPACE_OPTIMIZER_SCHEMA
            value: ${var.gold_schema}
          - name: GENIE_SPACE_OPTIMIZER_WAREHOUSE_ID
            value: ${var.warehouse_id}
      resources:
        - name: "sql-warehouse"
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: "CAN_USE"
      permissions:
        - user_name: "users"
          level: "CAN_USE"

targets:
  dev:
    mode: development
    default: true
