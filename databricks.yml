bundle:
  name: "genie-space-optimizer"

variables:
  app_name:
    default: "genie-space-optimizer"
  catalog:
    default: "vibe_coding_workshop_catalog"
  gold_schema:
    default: "genie_optimization"
  warehouse_id:
    default: "02c1885622661afa"
  deploy_profile:
    default: "genie-test"

include:
  - resources/genie_optimization_job.yml

sync:
  include:
    - .build

artifacts:
  default:
    build: apx build && uv run python resources/grant_app_uc_permissions.py --profile ${var.deploy_profile} --app-name ${var.app_name} --catalog ${var.catalog} --schema ${var.gold_schema}

resources:
  apps:
    genie-space-optimizer-app:
      name: ${var.app_name}
      description: "genie-space-optimizer created with apx"
      source_code_path: ./.build
      user_api_scopes:
        - "dashboards.genie"
        - "sql"
      config:
        env:
          - name: GENIE_SPACE_OPTIMIZER_CATALOG
            value: ${var.catalog}
          - name: GENIE_SPACE_OPTIMIZER_SCHEMA
            value: ${var.gold_schema}
          - name: GENIE_SPACE_OPTIMIZER_WAREHOUSE_ID
            value: ${var.warehouse_id}
      resources:
        - name: "sql-warehouse"
          sql_warehouse:
            id: ${var.warehouse_id}
            permission: "CAN_USE"
      permissions:
        - user_name: "users"
          level: "CAN_USE"

targets:
  dev:
    mode: development
    default: true
