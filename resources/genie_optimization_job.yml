resources:
  jobs:
    genie_optimization_job:
      name: "${bundle.target}-genie-optimization"
      description: "Multi-task Genie Space optimization pipeline"
      tasks:
        - task_key: preflight
          notebook_task:
            notebook_path: ../src/genie_space_optimizer/jobs/run_preflight.py
            base_parameters:
              run_id: ""
              space_id: ""
              catalog: "${var.catalog}"
              schema: "${var.gold_schema}"
              domain: ""
              triggered_by: ""
              apply_mode: "genie_config"
          environment_key: default
          timeout_seconds: 600
          max_retries: 1

        - task_key: baseline_eval
          depends_on:
            - task_key: preflight
          notebook_task:
            notebook_path: ../src/genie_space_optimizer/jobs/run_baseline.py
            base_parameters:
              run_id: ""
              catalog: "${var.catalog}"
              schema: "${var.gold_schema}"
          environment_key: default
          timeout_seconds: 3600
          max_retries: 1

        - task_key: lever_loop
          depends_on:
            - task_key: baseline_eval
          notebook_task:
            notebook_path: ../src/genie_space_optimizer/jobs/run_lever_loop.py
            base_parameters:
              run_id: ""
              catalog: "${var.catalog}"
              schema: "${var.gold_schema}"
              max_iterations: "5"
              levers: "[1,2,3,4,5,6]"
              apply_mode: "genie_config"
          environment_key: default
          timeout_seconds: 5400
          max_retries: 1

        - task_key: finalize
          depends_on:
            - task_key: lever_loop
          notebook_task:
            notebook_path: ../src/genie_space_optimizer/jobs/run_finalize.py
            base_parameters:
              run_id: ""
              catalog: "${var.catalog}"
              schema: "${var.gold_schema}"
              run_repeatability: "true"
          environment_key: default
          timeout_seconds: 1800
          max_retries: 1

        - task_key: deploy_check
          depends_on:
            - task_key: finalize
          condition_task:
            op: "NOT_EQUAL"
            left: "{{tasks.preflight.values.deploy_target}}"
            right: ""

        - task_key: deploy
          depends_on:
            - task_key: deploy_check
              outcome: "true"
          notebook_task:
            notebook_path: ../src/genie_space_optimizer/jobs/run_deploy.py
            base_parameters:
              run_id: ""
              catalog: "${var.catalog}"
              schema: "${var.gold_schema}"
          environment_key: default
          timeout_seconds: 1800
          max_retries: 1

      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - mlflow[databricks]>=3.4.0
              - databricks-sdk>=0.40.0
              - databricks-connect>=15.4.0
      max_concurrent_runs: 3

    genie_evaluation_job:
      name: "${bundle.target}-genie-evaluation"
      description: "Standalone evaluation (triggered by lever_loop and baseline_eval tasks)"
      tasks:
        - task_key: evaluate
          notebook_task:
            notebook_path: ../src/genie_space_optimizer/jobs/run_evaluation_only.py
            base_parameters:
              space_id: ""
              experiment_name: ""
              iteration: "0"
              domain: ""
              model_id: ""
              eval_scope: "full"
              catalog: "${var.catalog}"
              schema: "${var.gold_schema}"
          environment_key: default
          timeout_seconds: 3600
          max_retries: 1
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - mlflow[databricks]>=3.4.0
              - databricks-sdk>=0.40.0
              - databricks-connect>=15.4.0
