          The LLM should output proposals when it identifies patterns where:
          - Multiple questions need the same complex aggregation → suggest METRIC_VIEW
          - Multiple questions need the same date/category transformation → suggest FUNCTION
          - A calculation is repeated across questions but isn't pre-defined → suggest either

