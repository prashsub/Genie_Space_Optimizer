  # ───────────────────────────────────────────────────────────────────
  # FEATURE 3: Animated Loading Steps on Start Optimization
  # ───────────────────────────────────────────────────────────────────
  - id: start-optimization-loading-animation
    title: "Show animated step-by-step loading when starting optimization"
    priority: P2
    status: backlog
    effort: S
    depends_on: []

    description: |
      When the user clicks "Start Optimization", the button shows "Starting…"
      with a spinner until the API returns (~3-8 seconds). This feels frozen.
      Replace it with an animated stepper overlay showing the background steps.

    references:
      - label: "Vercel deploy animation pattern"
        url: "https://vercel.com"

    current_state:
      summary: |
        Button enters loading state with `triggerOpt.isPending` → shows
        `<Loader2 className="animate-spin" />` and text "Starting…".
        On success: toast + navigate to `/runs/$runId`.
        On error: error toast.
      files:
        - path: src/genie_space_optimizer/ui/routes/spaces/$spaceId.tsx
          lines: "230-253"
          current_code: |
            <Button
              onClick={handleOptimize}
              disabled={triggerOpt.isPending || hasActiveRun || ...}
              className="bg-db-red hover:bg-db-red/90"
            >
              <Rocket className="mr-2 h-4 w-4" />
              {triggerOpt.isPending ? "Starting…" : "Start Optimization"}
            </Button>

    target_state:
      summary: |
        When the button is clicked, a Dialog overlay appears with animated steps.
        Steps auto-advance on timers. The final step resolves when the API
        responds. On success, brief checkmark animation then navigate.
        On error, show error on the current step.

      animation_steps:
        - label: "Validating permissions"
          icon: "Shield"
          duration_ms: 800
        - label: "Preparing benchmark suite"
          icon: "FileText"
          duration_ms: 1200
        - label: "Uploading optimization artifacts"
          icon: "Upload"
          duration_ms: 1000
        - label: "Launching optimization workflow"
          icon: "Rocket"
          duration_ms: 1500
        - label: "Confirming run started"
          icon: "CheckCircle"
          duration_ms: 0  # resolves on API response

    tasks:
      - id: 3c
        title: "Check/add animation dependency"
        status: pending
        depends_on: []
        files_to_modify: []
        instructions: |
          Check if framer-motion is already installed:
            grep "framer-motion" package.json

          If NOT present, decide: use framer-motion OR pure CSS.
          RECOMMENDED: Use pure CSS with Tailwind `animate-*` utilities to
          avoid adding a ~30KB dependency. The animation is simple enough
          (fade-in steps with check marks) to implement with CSS only.

          If you choose framer-motion:
            apx bun add framer-motion

        verify: |
          1. Run `apx dev check` — must pass.

      - id: 3a
        title: "Create OptimizationLoadingStepper component"
        status: pending
        depends_on: ["3c"]
        files_to_modify:
          - src/genie_space_optimizer/ui/components/OptimizationLoadingStepper.tsx (NEW FILE)
        instructions: |
          Create a new component at the path above.

          Props interface:
            interface LoadingStepperProps {
              isOpen: boolean;
              isComplete: boolean;
              error: string | null;
              onNavigate: () => void;  // called after success animation
            }

          Behavior:
          - Shows a Dialog with 5 steps (defined as a constant inside the file).
          - Each step has: icon (from lucide-react), label, and a status indicator.
          - Steps auto-advance on timers (useEffect with setTimeout chain).
          - While a step is active: show Loader2 spinner.
          - When a step completes: show CheckCircle with green color, fade-in.
          - When `isComplete` becomes true: fast-forward to last step, show
            success state, wait 800ms, then call `onNavigate`.
          - When `error` is set: show X icon on current step with error message.
          - Use Tailwind transitions: `transition-all duration-300`,
            `animate-in fade-in`, etc.

          Use these lucide-react icons:
            Shield, FileText, Upload, Rocket, CheckCircle, XCircle, Loader2

          Use Dialog from "@/components/ui/dialog" for the overlay.

        verify: |
          1. Run `apx dev check` — must pass.
          2. File exists and exports the component.

      - id: 3b
        title: "Integrate stepper into space detail page"
        status: pending
        depends_on: ["3a"]
        files_to_modify:
          - src/genie_space_optimizer/ui/routes/spaces/$spaceId.tsx
        instructions: |
          STEP 1 — Import the component:
            import { OptimizationLoadingStepper } from "@/components/OptimizationLoadingStepper";

          STEP 2 — Add state for stepper control:
            const [stepperOpen, setStepperOpen] = useState(false);
            const [stepperError, setStepperError] = useState<string | null>(null);
            const [stepperComplete, setStepperComplete] = useState(false);
            const [pendingRunId, setPendingRunId] = useState<string | null>(null);

          STEP 3 — Modify `doStartOptimization()`:
            - Before `triggerOpt.mutate(...)`, add:
                setStepperOpen(true);
                setStepperError(null);
                setStepperComplete(false);
            - In `onSuccess`: instead of immediately navigating, set:
                setPendingRunId(res.data?.runId);
                setStepperComplete(true);
                // navigation happens via onNavigate callback
            - In `onError`: set:
                setStepperError(detail);
                // keep stepper open to show error

          STEP 4 — Render the stepper in the JSX (after the AlertDialog):
            <OptimizationLoadingStepper
              isOpen={stepperOpen}
              isComplete={stepperComplete}
              error={stepperError}
              onNavigate={() => {
                setStepperOpen(false);
                if (pendingRunId) {
                  navigate({ to: "/runs/$runId", params: { runId: pendingRunId } });
                }
              }}
            />

          STEP 5 — The "Starting…" text in the button can remain as fallback,
          but the stepper overlay is the primary feedback now.

        verify: |
          1. Run `apx dev check` — must pass.
          2. Open app in browser, go to a space detail page.
          3. Click Start Optimization — stepper overlay appears with animated steps.
          4. Steps advance smoothly.
          5. After API responds, final success animation plays, then navigates.

    acceptance_criteria:
      - "Clicking Start Optimization shows animated step progression in a Dialog overlay"
      - "Steps advance smoothly with icon transitions (spinner → check)"
      - "Final step resolves when the API call returns success"
      - "API errors display an error state (X icon + message) on the current step"
      - "After success animation, user is navigated to the run detail page"
      - "Total animation duration < 5s (steps pace to fill the typical API wait time)"
      - "Dialog can be dismissed if an error occurs"

    risks:
      - "If API responds very quickly (<500ms), animation may feel artificial — set minimum 1.5s display"
      - "Timer-based steps are cosmetic, not real progress — keep labels vague enough to be accurate"

  # ───────────────────────────────────────────────────────────────────
  # FEATURE 4: Strategist Improvement Suggestions
  # ───────────────────────────────────────────────────────────────────
  - id: strategist-improvement-suggestions
    title: "Strategist proposes new Metric Views and Functions via a suggestions state table"
    priority: P1
    status: backlog
    effort: XL
    depends_on: []

    description: |
      Extend the Adaptive Strategist to propose **structural improvements**
      beyond patches: new Metric Views and new SQL Functions that would improve
      the Genie Space. Proposals are captured in a Delta state table
      (`improvement_suggestions`) for human review. Users accept/reject from
      the frontend. Accepted proposals can be applied (creating actual UC objects).

    references:
      - label: "Unity Catalog Metric Views"
        url: "https://docs.databricks.com/aws/en/metric-views/"

    current_state:
      summary: |
        The strategist produces Action Groups with `lever_directives` and
        optional `global_instruction_rewrite`. It does NOT propose creating
        new objects. There is no suggestions state table.
      files:
        - path: src/genie_space_optimizer/optimization/optimizer.py
          detail: "AdaptiveStrategist class. Triage → Detail phases. No proposals field."
        - path: src/genie_space_optimizer/optimization/state.py
          detail: |
            Delta tables: genie_opt_runs, genie_opt_iterations,
            genie_benchmarks_<domain>, genie_opt_eval_results.
            No improvement_suggestions table.
        - path: src/genie_space_optimizer/optimization/harness.py
          detail: "Lever loop: strategist → apply → evaluate → accept/rollback."

    target_state:
      summary: |
        1. New `improvement_suggestions` Delta table for proposals.
        2. Strategist output schema gains a `proposals` array.
        3. Lever loop writes proposals to state table.
        4. Backend API for listing/accepting/rejecting/applying proposals.
        5. Frontend UI for reviewing proposals on run detail page.

      state_table:
        name: "improvement_suggestions"
        delta_table_name: "genie_opt_suggestions"
        location: "<catalog>.<schema>.genie_opt_suggestions"
        columns:
          - { name: suggestion_id, type: STRING, desc: "UUID primary key" }
          - { name: run_id, type: STRING, desc: "Optimization run ID" }
          - { name: space_id, type: STRING, desc: "Genie Space ID" }
          - { name: iteration, type: INT, desc: "Iteration number" }
          - { name: suggestion_type, type: STRING, desc: "METRIC_VIEW | FUNCTION" }
          - { name: title, type: STRING, desc: "Human-readable title" }
          - { name: rationale, type: STRING, desc: "Why the strategist recommends this" }
          - { name: definition, type: STRING, desc: "YAML for metric views or SQL for functions" }
          - { name: affected_questions, type: STRING, desc: "JSON array of question texts" }
          - { name: estimated_impact, type: STRING, desc: "HIGH | MEDIUM | LOW" }
          - { name: status, type: STRING, desc: "PROPOSED | ACCEPTED | REJECTED | APPLIED" }
          - { name: reviewed_by, type: STRING, desc: "User who reviewed" }
          - { name: reviewed_at, type: TIMESTAMP, desc: "When reviewed" }
          - { name: created_at, type: TIMESTAMP, desc: "When proposed" }

      api_endpoints:
        - method: GET
          path: "/api/genie/runs/{run_id}/suggestions"
          operation_id: "getImprovementSuggestions"
          response_model: "list[SuggestionOut]"
        - method: POST
          path: "/api/genie/suggestions/{suggestion_id}/review"
          operation_id: "reviewSuggestion"
          request_body: "SuggestionReviewRequest { status: str, comment: str | None }"
        - method: POST
          path: "/api/genie/suggestions/{suggestion_id}/apply"
          operation_id: "applySuggestion"

    tasks:
      - id: 4a
        title: "Create improvement_suggestions Delta state table"
        status: pending
        depends_on: []
        files_to_modify:
          - src/genie_space_optimizer/optimization/state.py
          - src/genie_space_optimizer/common/config.py
        instructions: |
          In config.py, add:
            TABLE_SUGGESTIONS = "genie_opt_suggestions"

          In state.py, add functions following the existing pattern
          (see `create_optimization_runs_table()` as a template):
            - create_improvement_suggestions_table(spark, catalog, schema)
            - write_suggestion(spark, catalog, schema, suggestion_dict)
            - load_suggestions(spark, run_id, catalog, schema) -> pd.DataFrame
            - update_suggestion_status(spark, suggestion_id, catalog, schema, status, reviewed_by)

          Call create_improvement_suggestions_table() from
          ensure_optimization_tables() so it's created alongside other tables.

        verify: |
          1. Run `apx dev check` — must pass.
          2. All four functions exist in state.py.

      - id: 4b
        title: "Extend strategist output schema for proposals"
        status: pending
        depends_on: []
        files_to_modify:
          - src/genie_space_optimizer/optimization/optimizer.py
          - src/genie_space_optimizer/common/config.py
        instructions: |
