# Genie Space Optimizer — Feature Backlog
# ═══════════════════════════════════════════════════════════════════════
#
# AGENT HARNESS
# ─────────────
# This file is the source of truth for what to build. It is paired with:
#
#   docs/agent-progress.json   — machine-readable task status & session log
#   .cursor/rules/backlog-agent.mdc — session protocol (Orient → Pick →
#                                     Execute → Verify → Close)
#
# Any agent (AI or human) starting a new session MUST:
#   1. Read docs/agent-progress.json to see what is done / blocked.
#   2. Read git log --oneline -15 for recent commit context.
#   3. Pick exactly ONE task from this file (highest-priority, first pending).
#   4. Implement, verify against acceptance_criteria, commit, update progress.
#   5. End the session cleanly — no half-finished work.
#
# See the Anthropic article on long-running agent harnesses for background:
# https://www.anthropic.com/engineering/effective-harnesses-for-long-running-agents
#
# RECOMMENDED EXECUTION ORDER
# ────────────────────────────
# Feature 2 (tasks 2a → 2b → 2c) ships first — M effort, self-contained.
# Feature 1 (tasks 1b → 1a → 1c → 1d → 1e → 1f) ships second — P0, XL.
# Feature 3 (tasks 3c → 3a → 3b) ships third — S effort, UI polish.
# Feature 4 (tasks 4a → 4b → 4c → 4d → 4e → 4f → 4g) ships last — XL.
#
# FEATURE SCHEMA
# ──────────────
# Each feature is a self-contained specification with enough context for
# an agent or developer to implement it without guesswork.
#
# Structure per feature:
#   id             – stable slug (used for branch names, commit prefixes)
#   title          – human-readable name
#   priority       – P0 (critical) / P1 (high) / P2 (medium) / P3 (low)
#   status         – backlog | ready | in_progress | review | done
#   effort         – XS / S / M / L / XL (t-shirt sizing)
#   depends_on     – list of feature ids that must land first
#   description    – what and why (business context)
#   references     – external docs, Figma links, prior chat IDs
#   current_state  – how the system works today (code pointers)
#   target_state   – how it should work after implementation
#   tasks          – ordered implementation steps with file-level detail
#   acceptance_criteria – testable conditions for "done"
#   risks          – known unknowns, edge cases, blockers
# ═══════════════════════════════════════════════════════════════════════

features:

  # ───────────────────────────────────────────────────────────────────
  # FEATURE 2: Lever Acknowledgement Checkboxes
  # ───────────────────────────────────────────────────────────────────
  - id: lever-acknowledgement-ui
    title: "Add lever acknowledgement checkboxes before starting optimization"
    priority: P1
    status: backlog
    effort: M
    depends_on: []

    description: |
      Before the user can press "Start Optimization", they must acknowledge
      what the optimization will modify. A series of checkboxes maps 1:1 to the
      optimization levers. Unchecked levers are sent as disabled in the trigger
      request, and the workflow skips those levers entirely. All levers are
      checked by default.

    references: []

    current_state:
      summary: |
        The frontend has an apply_mode toggle ("Config Only" vs "Config + UC
        Write Backs") and a confirmation dialog for UC writes. There are NO
        per-lever controls. The `TriggerRequest` sends only `{ space_id,
        apply_mode }` and the backend hardcodes `levers` to `[1,2,3,4,5]`.

        THE FULL CALL CHAIN (trigger → job) today:
        1. Frontend: `useTriggerOptimization().mutate({ data: { space_id, apply_mode } })`
        2. API:      `POST /api/genie/trigger` → `trigger_optimization()` in routes/trigger.py
        3. Core:     `trigger_optimization()` calls `do_start_optimization()` from routes/spaces.py
                     passing `apply_mode=body.apply_mode` — but NOT levers (no such param exists).
        4. Job:      `do_start_optimization()` calls `submit_optimization()` from job_launcher.py
                     — levers is NOT passed, so it defaults to `"[1,2,3,4,5]"`.
        5. Job DAG:  `submit_optimization()` puts `levers` into `job_parameters` dict.

      files:
        - path: src/genie_space_optimizer/backend/models.py
          lines: "141-143"
          current_code: |
            class TriggerRequest(BaseModel):
                space_id: str
                apply_mode: str = "genie_config"

        - path: src/genie_space_optimizer/backend/routes/trigger.py
          lines: "22-55"
          current_code: |
            @router.post("/trigger", response_model=TriggerResponse, operation_id="triggerOptimization")
            def trigger_optimization(body: TriggerRequest, ws, sp_ws, config, headers):
                from .spaces import do_start_optimization
                result = do_start_optimization(
                    space_id=body.space_id,
                    ws=ws, sp_ws=sp_ws, config=config, headers=headers,
                    apply_mode=body.apply_mode,
                    # NOTE: no `levers` param passed here
                )
                return TriggerResponse(runId=result.runId, ...)

        - path: src/genie_space_optimizer/backend/routes/spaces.py
          lines: "751-758"
          current_code: |
            def do_start_optimization(
                space_id: str,
                ws: WorkspaceClient,
                sp_ws: WorkspaceClient,
                config,
                headers,
                apply_mode: str = "genie_config",
                # NOTE: no `levers` param exists
            ) -> OptimizeResponse:
          call_to_submit: |
            # At line ~1036, levers is NOT passed so it defaults:
            job_run_id, job_id = submit_optimization(
                sp_ws,
                run_id=run_id, space_id=space_id, domain=domain,
                catalog=config.catalog, schema=config.schema_name,
                apply_mode=requested_apply_mode,
                triggered_by=current_user,
                experiment_name=experiment_name or "",
                # NOTE: no `levers=` kwarg — defaults to "[1,2,3,4,5]"
            )

        - path: src/genie_space_optimizer/backend/job_launcher.py
          lines: "561-574"
          current_code: |
            def submit_optimization(
                ws: WorkspaceClient,
                *,
                run_id: str, space_id: str, domain: str,
                catalog: str, schema: str,
                apply_mode: str = "genie_config",
                levers: str = "[1,2,3,4,5]",   # <-- already accepts levers!
                max_iterations: str = "5",
                triggered_by: str = "",
                experiment_name: str = "",
            ) -> tuple[str, int]:

        - path: src/genie_space_optimizer/ui/routes/spaces/$spaceId.tsx
          lines: "135-139"
          current_code: |
            function doStartOptimization() {
              triggerOpt.mutate({
                params: {},
                data: { space_id: spaceId, apply_mode: applyMode },
                // NOTE: no `levers` field
              }, { onSuccess: ..., onError: ... });
            }

        - path: src/genie_space_optimizer/common/config.py
          lines: "2023-2031"
          current_code: |
            LEVER_NAMES = {
                1: "Tables & Columns",
                2: "Metric Views",
                3: "Table-Valued Functions",
                4: "Join Specifications",
                5: "Genie Space Instructions",
            }
            DEFAULT_LEVER_ORDER = [1, 2, 3, 4, 5]

    target_state:
      summary: |
        A "What will be optimized" section with checkboxes appears above the
        Start Optimization button. Each lever is a labeled checkbox. All are
        checked by default. Unchecked levers are excluded from the API request.
        The `levers` array flows: frontend → TriggerRequest → do_start_optimization
        → submit_optimization → job_parameters.

      lever_checkboxes:
        - lever: 1
          label: "Tables & Columns"
          description: "Update table descriptions, column descriptions, column visibility, and synonyms"
          default: true
        - lever: 2
          label: "Metric Views"
          description: "Update metric view column descriptions"
          default: true
        - lever: 3
          label: "Table-Valued Functions"
          description: "Modify function descriptions, routing logic, and remove underperforming TVFs"
          default: true
        - lever: 4
          label: "Join Specifications"
          description: "Add, update, or remove join relationships between tables"
          default: true
        - lever: 5
          label: "Genie Space Instructions"
          description: "Rewrite global routing instructions and add domain-specific guidance"
          default: true

    tasks:
      - id: 2a
        title: "Extend TriggerRequest model with levers field"
        status: pending
        depends_on: []
        files_to_modify:
          - src/genie_space_optimizer/backend/models.py
        do_not_modify:
          - src/genie_space_optimizer/ui/lib/api.ts  # auto-generated, do NOT edit
        instructions: |
          WHAT TO DO:
          Open `src/genie_space_optimizer/backend/models.py`.
          Find the `TriggerRequest` class at line 141.
          Add one field: `levers: list[int] | None = None`.
          When `None`, the backend will treat it as "all levers" = [1,2,3,4,5].

          EXACT CHANGE — replace:
            class TriggerRequest(BaseModel):
                space_id: str
                apply_mode: str = "genie_config"

          WITH:
            class TriggerRequest(BaseModel):
                space_id: str
                apply_mode: str = "genie_config"
                levers: list[int] | None = None

          That is the ONLY change in this task. Do NOT touch any other file.

        verify: |
          1. Run `apx dev check` — must pass with zero errors.
          2. The OpenAPI client will auto-regenerate (dev servers running).
             Confirm by checking that `src/genie_space_optimizer/ui/lib/api.ts`
             now includes `levers` in the `TriggerRequest` type.

      - id: 2b
        title: "Wire levers through trigger route → do_start_optimization → submit_optimization"
        status: pending
        depends_on: ["2a"]
        files_to_modify:
          - src/genie_space_optimizer/backend/routes/trigger.py
          - src/genie_space_optimizer/backend/routes/spaces.py
        do_not_modify:
          - src/genie_space_optimizer/backend/job_launcher.py  # already accepts `levers` param
          - src/genie_space_optimizer/ui/lib/api.ts  # auto-generated
        instructions: |
          This task threads the `levers` field from the API request all the way
          to the job submission. There are exactly TWO changes:

          CHANGE 1 — src/genie_space_optimizer/backend/routes/trigger.py
          In `trigger_optimization()` (line ~42), pass `levers` to `do_start_optimization`.

          Find:
            result = do_start_optimization(
                space_id=body.space_id,
                ws=ws,
                sp_ws=sp_ws,
                config=config,
                headers=headers,
                apply_mode=body.apply_mode,
            )

          Replace with:
            result = do_start_optimization(
                space_id=body.space_id,
                ws=ws,
                sp_ws=sp_ws,
                config=config,
                headers=headers,
                apply_mode=body.apply_mode,
                levers=body.levers,
            )

          CHANGE 2 — src/genie_space_optimizer/backend/routes/spaces.py
          (a) Add `levers` parameter to `do_start_optimization()` signature (line ~751):

              def do_start_optimization(
                  space_id: str,
                  ws: WorkspaceClient,
                  sp_ws: WorkspaceClient,
                  config,
                  headers,
                  apply_mode: str = "genie_config",
                  levers: list[int] | None = None,       # <-- ADD THIS LINE
              ) -> OptimizeResponse:

          (b) Near the top of the function, resolve levers to a JSON string:

              import json
              from genie_space_optimizer.common.config import DEFAULT_LEVER_ORDER
              levers_str = json.dumps(levers if levers else DEFAULT_LEVER_ORDER)

              (Note: `json` is already imported at the top of spaces.py, and
              `DEFAULT_LEVER_ORDER` must be imported from config.)

          (c) Pass `levers_str` to `submit_optimization()` at line ~1036:

              Find:
                job_run_id, job_id = submit_optimization(
                    sp_ws,
                    run_id=run_id,
                    space_id=space_id,
                    domain=domain,
                    catalog=config.catalog,
                    schema=config.schema_name,
                    apply_mode=requested_apply_mode,
                    triggered_by=current_user,
                    experiment_name=experiment_name or "",
                )

              Replace with (add the levers kwarg):
                job_run_id, job_id = submit_optimization(
                    sp_ws,
                    run_id=run_id,
                    space_id=space_id,
                    domain=domain,
                    catalog=config.catalog,
                    schema=config.schema_name,
                    apply_mode=requested_apply_mode,
                    levers=levers_str,
                    triggered_by=current_user,
                    experiment_name=experiment_name or "",
                )

          DO NOT modify job_launcher.py — it already accepts `levers: str`.

        verify: |
          1. Run `apx dev check` — must pass with zero errors.
          2. Trace the chain mentally:
             - TriggerRequest.levers (list[int] | None) →
             - trigger_optimization passes body.levers →
             - do_start_optimization receives levers: list[int] | None →
             - Resolves to JSON string via json.dumps() →
             - submit_optimization receives levers: str (e.g. "[1,3,5]") →
             - job_parameters dict includes the filtered levers

      - id: 2c
        title: "Add lever checkboxes to space detail page"
        status: pending
        depends_on: ["2a"]
        files_to_modify:
          - src/genie_space_optimizer/ui/routes/spaces/$spaceId.tsx
        do_not_modify:
          - src/genie_space_optimizer/ui/lib/api.ts  # auto-generated
        instructions: |
          This task adds a "What will be optimized" section with 5 checkboxes
          to the space detail page, between the apply-mode toggle and the Start
          Optimization button.

          STEP 1 — Add imports at the top of the file:
            Add `Checkbox` from "@/components/ui/checkbox" (shadcn/ui).
            If the Checkbox component doesn't exist yet, add it first:
              `apx components add checkbox --yes`
            Add `Label` from "@/components/ui/label" if not already imported.
            Add `Collapsible, CollapsibleContent, CollapsibleTrigger` from
              "@/components/ui/collapsible" (add component if missing).
            Add `ChevronDown` from "lucide-react".

          STEP 2 — Add lever definition constant OUTSIDE the component:
            const LEVERS = [
              { id: 1, label: "Tables & Columns", desc: "Update table descriptions, column descriptions, column visibility, and synonyms" },
              { id: 2, label: "Metric Views", desc: "Update metric view column descriptions" },
              { id: 3, label: "Table-Valued Functions", desc: "Modify function descriptions, routing logic, and remove underperforming TVFs" },
              { id: 4, label: "Join Specifications", desc: "Add, update, or remove join relationships between tables" },
              { id: 5, label: "Genie Space Instructions", desc: "Rewrite global routing instructions and add domain-specific guidance" },
            ] as const;

          STEP 3 — Add state inside the `SpaceDetail` function (near line 92):
            const [selectedLevers, setSelectedLevers] = useState<Set<number>>(
              new Set(LEVERS.map((l) => l.id)),
            );

            const toggleLever = (id: number) => {
              setSelectedLevers((prev) => {
                const next = new Set(prev);
                if (next.has(id)) next.delete(id);
                else next.add(id);
                return next;
              });
            };

          STEP 4 — Update `doStartOptimization()` (line ~136) to include levers:
            Find:
              data: { space_id: spaceId, apply_mode: applyMode },
            Replace with:
              data: {
                space_id: spaceId,
                apply_mode: applyMode,
                levers: selectedLevers.size === LEVERS.length
                  ? undefined   // undefined = all levers (backend default)
                  : Array.from(selectedLevers).sort(),
              },

          STEP 5 — Add the checkbox UI. Insert this JSX BETWEEN the apply-mode
          toggle `<div>` (ends around line 228) and the Start Optimization
          `<Button>` (starts around line 230). Place it inside the same
          `<div className="space-y-2 text-right">` parent:

            <Collapsible defaultOpen className="w-64 text-left">
              <CollapsibleTrigger className="flex items-center gap-1 text-xs font-medium text-muted-foreground hover:text-foreground">
                <ChevronDown className="h-3 w-3" />
                What will be optimized
              </CollapsibleTrigger>
              <CollapsibleContent className="mt-2 space-y-2">
                {LEVERS.map((lever) => (
                  <label
                    key={lever.id}
                    className="flex items-start gap-2 cursor-pointer"
                  >
                    <Checkbox
                      checked={selectedLevers.has(lever.id)}
                      onCheckedChange={() => toggleLever(lever.id)}
                      className="mt-0.5"
                    />
                    <div>
                      <span className="text-sm font-medium">{lever.label}</span>
                      <p className="text-xs text-muted-foreground">{lever.desc}</p>
                    </div>
                  </label>
                ))}
              </CollapsibleContent>
            </Collapsible>

          STEP 6 — Disable Start Optimization when zero levers selected.
          In the `<Button>` disabled condition (line ~233), add:
            `selectedLevers.size === 0`

            Find:
              disabled={
                triggerOpt.isPending ||
                hasActiveRun ||
                !canStartOptimization ||
                (applyMode === "both" && !canStartWithWrites)
              }
            Replace with:
              disabled={
                triggerOpt.isPending ||
                hasActiveRun ||
                !canStartOptimization ||
                selectedLevers.size === 0 ||
                (applyMode === "both" && !canStartWithWrites)
              }

        verify: |
          1. Run `apx dev check` — must pass with zero errors.
          2. Open the app in browser (use Playwright MCP or native browser tool).
          3. Navigate to a space detail page.
          4. Verify: all 5 checkboxes are visible and checked by default.
          5. Uncheck one lever — Start Optimization button should still be enabled.
          6. Uncheck ALL levers — Start Optimization button should be disabled.
          7. The UC write-backs confirmation dialog should still work normally.

      - id: 2d
        title: "Add lever metadata endpoint (optional, skip if short on time)"
        status: pending
        depends_on: ["2a"]
        optional: true
        files_to_modify:
          - src/genie_space_optimizer/backend/routes/trigger.py
          - src/genie_space_optimizer/backend/models.py
        instructions: |
          OPTIONAL TASK — skip if the hardcoded LEVERS constant in 2c is sufficient.

          Add `GET /api/genie/levers` that returns the lever list from config.py
          so the frontend could fetch it dynamically instead of hardcoding.

          In models.py, add:
            class LeverInfo(BaseModel):
                id: int
                name: str
                description: str

          In trigger.py (or a new route file), add:
            @router.get("/levers", response_model=list[LeverInfo], operation_id="listLevers")
            def list_levers():
                from genie_space_optimizer.common.config import LEVER_NAMES
                descriptions = {
                    1: "Update table descriptions, column descriptions, column visibility, and synonyms",
                    2: "Update metric view column descriptions",
                    3: "Modify function descriptions, routing logic, and remove underperforming TVFs",
                    4: "Add, update, or remove join relationships between tables",
                    5: "Rewrite global routing instructions and add domain-specific guidance",
                }
                return [
                    LeverInfo(id=k, name=v, description=descriptions.get(k, ""))
                    for k, v in sorted(LEVER_NAMES.items())
                ]

        verify: |
          1. Run `apx dev check` — must pass.
          2. curl http://localhost:<port>/api/genie/levers — returns JSON array of 5 levers.

    acceptance_criteria:
      - "All 5 lever checkboxes are visible on the space detail page and checked by default"
      - "Unchecking a lever excludes its number from the `levers` array in the POST /trigger request body"
      - "When all levers are checked, `levers` is either omitted or sent as `null` (backend default)"
      - "Start Optimization button is disabled if zero levers are selected"
      - "Backend correctly serializes the levers list to JSON string and passes it to submit_optimization()"
      - "The Databricks Job receives the correct `levers` param in job_parameters (e.g. '[1,3,5]')"
      - "The optimization workflow skips unchecked levers — this is EXISTING behavior in the lever loop when a lever number is absent from the levers list"
      - "UC write-backs confirmation dialog still works alongside lever checkboxes"
      - "Checking/unchecking levers does not break the apply_mode toggle"

    risks:
      - "Lever descriptions in the frontend LEVERS constant must be kept in sync with config.py LEVER_NAMES"
      - "If lever 5 (instructions) is skipped but lever 1-4 changes need new instructions, quality may regress — acceptable tradeoff"
      - "shadcn Checkbox and Collapsible components may need to be added via `apx components add`"

  # ───────────────────────────────────────────────────────────────────
  # FEATURE 1: UC Model Registration + Deployment Job
  # ───────────────────────────────────────────────────────────────────
  - id: uc-model-registration-and-deployment-job
    title: "Register optimized model to Unity Catalog and link a deployment job"
    priority: P0
    status: backlog
    effort: XL
    depends_on: []

    description: |
      After the optimization workflow reaches the **finalize** stage and the
      repeatability test passes, the champion model should be registered as a
      proper Unity Catalog **Registered Model** (not just an MLflow LoggedModel).
      The registered model must carry the `@champion` alias and be linked to a
      **Deployment Job** that takes the model and deploys the optimized Genie
      Space configuration to a target environment (UAT or Prod). The target
      workspace is specified as a job parameter.

    references:
      - label: "Train & register UC-compatible models"
        url: "https://docs.databricks.com/aws/en/machine-learning/manage-model-lifecycle/#train-and-register-unity-catalog-compatible-models"
      - label: "Use model aliases"
        url: "https://docs.databricks.com/aws/en/machine-learning/manage-model-lifecycle/#use-model-aliases"
      - label: "MLflow 3 Deployment Jobs"
        url: "https://docs.databricks.com/aws/en/mlflow/deployment-job"

    current_state:
      summary: |
        `create_genie_model_version()` in models.py creates MLflow **LoggedModel**
        snapshots per iteration. `promote_best_model()` sets a `champion` alias
        on the best LoggedModel via `mlflow.set_logged_model_alias()`.
        The `deploy` task applies the config back to the **same** Genie Space.
        There is NO UC Registered Model and NO Deployment Job.

      files:
        - path: src/genie_space_optimizer/optimization/models.py
          detail: |
            `create_genie_model_version()` (line 33) — creates LoggedModel.
            `promote_best_model()` (line 130) — finds best iteration by
            overall_accuracy, sets alias via mlflow.set_logged_model_alias().
            Uses `MODEL_NAME_TEMPLATE = "genie-space-{{ space_id }}"`.
        - path: src/genie_space_optimizer/optimization/harness.py
          detail: |
            `_run_finalize()` calls `promote_best_model()` after repeatability
            test passes and human review session completes.
        - path: src/genie_space_optimizer/backend/job_launcher.py
          detail: |
            5-task DAG: preflight → baseline_eval → lever_loop → finalize → deploy.
            `_JOB_PARAM_DEFAULTS` includes `"deploy_target": ""` (always empty).
            `submit_optimization()` passes `"deploy_target": ""` to job_parameters.
        - path: src/genie_space_optimizer/common/config.py
          detail: |
            `MODEL_NAME_TEMPLATE = "genie-space-{{ space_id }}"` (line 2077).
            `format_mlflow_template()` handles `{{ variable }}` syntax.

    target_state:
      summary: |
        After finalize passes the repeatability test:
        1. Register the champion as a UC Registered Model version at
           `<catalog>.<schema>.genie_space_<space_id>`.
        2. Set the `@champion` alias on the new model version via
           `MlflowClient().set_registered_model_alias()`.
        3. Create/connect a Deployment Job. The job accepts `target_workspace_url`
           and re-applies the optimized config in that workspace.
        4. Expose deployment job status in the frontend run detail page.

      uc_model:
        name_pattern: "<catalog>.<schema>.genie_space_<space_id>"
        aliases: ["champion"]
        tags:
          domain: "from run params"
          space_id: "from run params"
          optimization_run_id: "from run params"
          traceability: "genie_space_optimizer"
        artifacts:
          - space_config.json
          - metadata_snapshot.json
          - eval_scores.json

      deployment_job:
        name_pattern: "genie-optimizer-deploy-<space_id>"
        parameters:
          - name: model_name
            description: "UC 3-level model name (e.g. main.genie_optimization.genie_space_abc123)"
          - name: model_version
            description: "Version number to deploy"
          - name: target_workspace_url
            description: "Databricks workspace URL to deploy the Genie Space to"
          - name: target_space_id
            description: "Genie Space ID in the target workspace (same space_id if omitted)"
        trigger: "Auto-triggered on new model version registration"
        run_as: "Service principal (least privilege)"

    tasks:
      - id: 1b
        title: "Add config constants for UC model registration"
        status: pending
        depends_on: []
        files_to_modify:
          - src/genie_space_optimizer/common/config.py
        instructions: |
          Add these constants near the existing `MODEL_NAME_TEMPLATE` (line 2077)
          in the `# ── 10. MLflow / Model` section:

            UC_REGISTERED_MODEL_TEMPLATE = "{{ catalog }}.{{ schema }}.genie_space_{{ space_id }}"
            """Three-level UC registered model name. Interpolated at runtime."""

            ENABLE_UC_MODEL_REGISTRATION: bool = True
            """When True, finalize registers the champion as a UC Registered Model."""

            DEPLOYMENT_JOB_NAME_TEMPLATE = "genie-optimizer-deploy-{{ space_id }}"
            """Name pattern for the per-space deployment job."""

        verify: |
          1. Run `apx dev check` — must pass.
          2. Grep for UC_REGISTERED_MODEL_TEMPLATE — appears in config.py.

      - id: 1a
        title: "Add register_uc_model() and call from finalize"
        status: pending
        depends_on: ["1b"]
        files_to_modify:
          - src/genie_space_optimizer/optimization/models.py
          - src/genie_space_optimizer/optimization/harness.py
        instructions: |
          CHANGE 1 — src/genie_space_optimizer/optimization/models.py
          Add a new function `register_uc_model()` after `promote_best_model()`:

            def register_uc_model(
                spark: "SparkSession",
                run_id: str,
                catalog: str,
                schema: str,
            ) -> str | None:
                """Register champion LoggedModel as a UC Registered Model version.

                Returns the model version number as a string, or None on failure.
                """
                from genie_space_optimizer.common.config import (
                    ENABLE_UC_MODEL_REGISTRATION,
                    UC_REGISTERED_MODEL_TEMPLATE,
                    format_mlflow_template,
                )
                if not ENABLE_UC_MODEL_REGISTRATION:
                    logger.info("UC model registration disabled, skipping")
                    return None

                run_row = load_run(spark, run_id, catalog, schema)
                if not run_row:
                    logger.error("Cannot register UC model: run %s not found", run_id)
                    return None

                best_model_id = run_row.get("best_model_id")
                space_id = run_row.get("space_id", "")
                if not best_model_id:
                    logger.warning("No best_model_id for run %s, skipping UC registration", run_id)
                    return None

                uc_model_name = format_mlflow_template(
                    UC_REGISTERED_MODEL_TEMPLATE,
                    catalog=catalog, schema=schema, space_id=space_id,
                )

                try:
                    mlflow.set_registry_uri("databricks-uc")
                    model_uri = f"models:/{best_model_id}"
                    mv = mlflow.register_model(model_uri, uc_model_name)
                    version = str(mv.version)

                    from mlflow import MlflowClient
                    client = MlflowClient(registry_uri="databricks-uc")
                    client.set_registered_model_alias(uc_model_name, "champion", int(version))

                    logger.info(
                        "Registered UC model %s version %s with @champion alias",
                        uc_model_name, version,
                    )
                    return version
                except Exception:
                    logger.exception("Failed to register UC model %s", uc_model_name)
                    return None

          CHANGE 2 — src/genie_space_optimizer/optimization/harness.py
          Find the call to `promote_best_model()` inside `_run_finalize()`.
          Immediately AFTER it, add:

            from genie_space_optimizer.optimization.models import register_uc_model
            register_uc_model(spark, run_id, catalog, schema)

          This call is fire-and-forget — if it fails, the run still completes.

        verify: |
          1. Run `apx dev check` — must pass.
          2. Read models.py — `register_uc_model()` exists with correct signature.
          3. Read harness.py — `register_uc_model` is called after `promote_best_model`.

